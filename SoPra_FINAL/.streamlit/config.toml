# Farb-Theme (modern, rein gestalterisch).
[theme]
base = "light"
primaryColor = "#2563EB"            # moderner Blau-Akzent
backgroundColor = "#FFFFFF"         # Inhaltskarte / Eingabefelder
secondaryBackgroundColor = "#F4F5F7" # Canvas / Sidebar-Flächen
textColor = "#1D1D1F"
font = "sans serif"

[theme.light]
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#ffffff"
textColor = "#111111"

[theme.dark]
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#ffffff"
textColor = "#111111"

[client]
toolbarMode = "minimal"
